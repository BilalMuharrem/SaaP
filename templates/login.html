{% extends "base.html" %}
{% block title %}Giriş Yap{% endblock %}
{% block body %}
<div class="auth-page">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="brand-icon" style="width:56px;height:56px;font-size:24px;margin:0 auto 12px auto;">B</div>
            <div style="font-size:22px;font-weight:800;">BMK Rekabet İstihbaratı</div>
            <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">Veri Odaklı Danışmanlık Hizmeti</div>
        </div>
        <div class="auth-card">
            <div class="auth-title">Giriş Yap</div>
            <div class="auth-subtitle">Hesabınıza giriş yaparak analize başlayın</div>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label">E-posta Adresi</label>
                    <input type="email" name="email" class="form-input" placeholder="ornek@firma.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Şifre</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px;">
                    Giriş Yap →
                </button>
            </form>
        </div>
        <div class="auth-footer">
            Hesabınız yok mu? <a href="{{ url_for('auth.register') }}">Kayıt Ol</a>
        </div>
    </div>
</div>
{% endblock %}
