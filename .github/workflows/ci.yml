name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    env:
      SECRET_KEY: 'ci-test-only-secret-key-not-for-production'
      DATABASE_URL: 'sqlite:///:memory:'
      GROQ_API_KEY: ''
      CELERY_BROKER_URL: 'memory://'
      LOG_LEVEL: 'WARNING'
      TESTING: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Bağımlılıklar
        run: |
          python -m pip install --upgrade pip
          # requirements.txt'i kur ama playwright/uc gibi ağır bağımlılıkları atla
          # (Bunlar testlerde gerek değil, scraping çalıştırılmıyor)
          pip install Flask Flask-Login Flask-SQLAlchemy Flask-Limiter \
                      SQLAlchemy Werkzeug python-dotenv celery redis \
                      beautifulsoup4 lxml requests groq markdown \
                      pytest pytest-flask pytest-cov

      - name: Linting (syntax check)
        run: |
          python -m py_compile app.py worker.py models.py extensions.py config.py
          python -m py_compile blueprints/*.py services/**/*.py utils/*.py

      - name: pytest
        run: |
          pytest --cov=blueprints --cov=utils --cov=services \
                 --cov-report=term --cov-report=xml \
                 -ra --tb=short

      - name: Coverage XML yükle
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
