[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    slow: yavaş testler (entegrasyon, scraping vb.)
    rate_limit: gerçek limit tetikleme testleri (ayrı çalıştır)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
