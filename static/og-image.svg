<?xml version="1.0" encoding="UTF-8"?>
<!--
  static/og-image.svg — Sosyal medya paylaşım kartı (1200×630).

  KULLANIM: Bu SVG schema.org/og:image meta tag'inde geçici olarak kullanılır.
  ÜRETİME ALMADAN ÖNCE: PNG'ye çevir (Twitter ve Facebook SVG'yi düzgün
  render etmez). Komut: `rsvg-convert -w 1200 -h 630 og-image.svg -o og-image.png`
  veya tarayıcıda aç → ekran görüntüsü → 1200×630'a kırp.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#1e293b"/>
        </linearGradient>
        <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#10b981"/>
        </linearGradient>
        <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#34d399"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Decorative grid (subtle) -->
    <g opacity="0.06" stroke="#ffffff" stroke-width="1">
        <line x1="0" y1="100" x2="1200" y2="100"/>
        <line x1="0" y1="200" x2="1200" y2="200"/>
        <line x1="0" y1="300" x2="1200" y2="300"/>
        <line x1="0" y1="400" x2="1200" y2="400"/>
        <line x1="0" y1="500" x2="1200" y2="500"/>
        <line x1="300" y1="0" x2="300" y2="630"/>
        <line x1="600" y1="0" x2="600" y2="630"/>
        <line x1="900" y1="0" x2="900" y2="630"/>
    </g>

    <!-- Decorative chart accent (top-right) -->
    <g transform="translate(820, 80)" opacity="0.5">
        <polyline points="0,180 60,140 120,160 180,90 240,110 300,50 340,70"
                  fill="none" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="300" cy="50" r="8" fill="#10b981"/>
    </g>

    <!-- Logo -->
    <g transform="translate(80, 130)">
        <rect width="100" height="100" rx="24" fill="url(#logo-grad)"/>
        <text x="50" y="74" font-family="Inter, system-ui, sans-serif" font-size="72"
              font-weight="900" fill="#ffffff" text-anchor="middle">B</text>
    </g>

    <!-- Brand name -->
    <text x="210" y="180" font-family="Inter, system-ui, sans-serif" font-size="56"
          font-weight="800" fill="#ffffff">BMK</text>
    <text x="210" y="220" font-family="Inter, system-ui, sans-serif" font-size="22"
          font-weight="500" fill="#94a3b8">Rekabet İstihbaratı</text>

    <!-- Headline -->
    <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="64"
          font-weight="800" fill="#ffffff">Trendyol & Hepsiburada</text>
    <text x="80" y="450" font-family="Inter, system-ui, sans-serif" font-size="64"
          font-weight="800" fill="url(#text-grad)">satıcılarının komuta merkezi.</text>

    <!-- Sub line -->
    <text x="80" y="510" font-family="Inter, system-ui, sans-serif" font-size="24"
          font-weight="400" fill="#cbd5e1">
        Fiyat takibi · SEO sıralama · YZ Strateji Danışmanı
    </text>

    <!-- Beta badge -->
    <g transform="translate(80, 545)">
        <rect width="220" height="40" rx="20" fill="rgba(245,158,11,0.18)" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="110" y="27" font-family="Inter, system-ui, sans-serif" font-size="15"
              font-weight="700" fill="#fbbf24" text-anchor="middle">BETA · İlk 100 ücretsiz</text>
    </g>

    <!-- URL -->
    <text x="1120" y="600" font-family="Inter, system-ui, sans-serif" font-size="18"
          font-weight="600" fill="#64748b" text-anchor="end">bmk.app</text>
</svg>
